<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات حسام الدين - مساعدك الذكي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 650px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(25px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .chat-header {
            padding: 22px 26px;
            background: rgba(255, 255, 255, 0.06);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .bot-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.3);
        }

        .header-info h2 {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
        }

        .header-info p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-top: 3px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.8;
            animation: fadeInUp 0.35s ease;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-start;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .message.bot.error {
            background: rgba(239, 68, 68, 0.12) !important;
            border-color: rgba(239, 68, 68, 0.2) !important;
            color: #fca5a5 !important;
        }

        .typing-indicator {
            align-self: flex-end;
            display: none;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .typing-indicator.active {
            display: flex;
            gap: 5px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .chat-input-area {
            padding: 16px 20px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 6px 6px 6px 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.1);
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            padding: 10px 0;
            resize: none;
            max-height: 120px;
            min-height: 24px;
        }

        #userInput::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .welcome-msg {
            text-align: center;
            padding: 50px 20px;
            color: rgba(255, 255, 255, 0.35);
        }

        .welcome-msg .icon {
            font-size: 56px;
            margin-bottom: 18px;
        }

        .welcome-msg h3 {
            color: rgba(255, 255, 255, 0.7);
            font-size: 22px;
            margin-bottom: 10px;
        }

        .welcome-msg p {
            font-size: 14px;
        }

        .model-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 210, 255, 0.15);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 12px;
            color: #00d2ff;
            font-size: 11px;
            margin-top: 8px;
        }

        @media (max-width: 480px) {
            .chat-container {
                height: 95vh;
                border-radius: 18px;
            }

            .chat-header {
                padding: 18px 20px;
            }

            .bot-avatar {
                width: 42px;
                height: 42px;
                font-size: 20px;
            }

            .header-info h2 {
                font-size: 17px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="bot-avatar">🧠</div>
            <div class="header-info">
                <h2>شات حسام الدين</h2>
                <p><span class="status-dot"></span>متصل الآن · يعمل بالذكاء الاصطناعي</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-msg">
                <div class="icon">💬</div>
                <h3>أهلاً بيك!</h3>
                <p>أنا مساعد حسام الدين الذكي، اسألني أي حاجة وأنا هرد عليك فوراً</p>
                <div class="model-badge">🤖 Gemini Flash via Google AI</div>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // Gemini API Key - مدمج مباشرة (X-goog-api-key format)
        const GEMINI_API_KEY = 'AQ.Ab8RN6IsQ8ee0Qq7l9lQlhFeFUnzGY7YDmfQ9MU93nbTG5mmYQ';

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Send on Enter (Shift+Enter for new line)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function addMessage(text, isUser) {
            const welcomeMsg = document.querySelector('.welcome-msg');
            if (welcomeMsg) welcomeMsg.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addErrorMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot error';
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            typingIndicator.classList.add('active');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            typingIndicator.classList.remove('active');
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = '';
            userInput.style.height = 'auto';
            showTyping();

            try {
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-goog-api-key': GEMINI_API_KEY
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: text }]
                        }],
                        generationConfig: {
                            temperature: 0.7,
                            maxOutputTokens: 2048,
                            topP: 0.95
                        }
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;

                if (!reply) {
                    throw new Error('مفيش رد من السيرفر');
                }

                hideTyping();
                addMessage(reply.trim(), false);

            } catch (error) {
                hideTyping();
                console.error('Error:', error);
                addErrorMessage('❌ حصل خطأ: ' + error.message + '\n\nجرب تاني أو تأكد من الاتصال.');
            }
        }
    </script>
</body>
</html>
